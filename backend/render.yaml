# Render.com Blueprint
services:
  - type: web
    name: neurovia-career-api
    runtime: python
    buildCommand: apt-get update && apt-get install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended && pip install -r requirements.txt
    startCommand: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: FRONTEND_URL
        value: https://neuroviacareer.netlify.app
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
